kind = "web"
previewPath = "/"
title = "CA Firm Website"
version = "1.0.0"
id = "artifacts/ca-firm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22386

[services.development]
run = "pnpm --filter @workspace/ca-firm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ca-firm", "run", "build" ]
publicDir = "artifacts/ca-firm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22386"
BASE_PATH = "/"
